services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      X12_API_ENVIRONMENT: production
      X12_API_FRONTEND_DIST_DIR: /srv/app/apps/web/dist
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=4)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "8000:8000"
    restart: unless-stopped
