name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "infra/terraform/**"
      - "scripts/package_lambda.sh"
      - "scripts/prune_lambda_versions.sh"
      - "VERSION"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}
    env:
      DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-2' }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      APP_NAME: ${{ vars.APP_NAME || 'x12-parser-encoder' }}
      LAMBDA_ARCHITECTURE: ${{ vars.LAMBDA_ARCHITECTURE || 'x86_64' }}
      LAMBDA_VERSION_KEEP_COUNT: ${{ vars.LAMBDA_VERSION_KEEP_COUNT || '3' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy configuration
        env:
          TERRAFORM_TFVARS: ${{ secrets.TERRAFORM_TFVARS }}
        run: |
          if [[ -z "${AWS_ACCOUNT_ID}" ]]; then
            echo "AWS_ACCOUNT_ID repository variable is required." >&2
            exit 1
          fi
          if [[ -z "${TERRAFORM_TFVARS}" ]]; then
            echo "TERRAFORM_TFVARS environment secret is required." >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Configure AWS credentials with OIDC role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.APP_NAME }}-deploy-${{ env.DEPLOY_ENV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build web
        run: |
          cd apps/web
          npm ci
          npm run build

      - name: Package Lambda
        run: bash scripts/package_lambda.sh

      - name: Prepare Terraform inputs
        env:
          TERRAFORM_TFVARS: ${{ secrets.TERRAFORM_TFVARS }}
        run: |
          tfstate_bucket="${APP_NAME}-tfstate-${AWS_ACCOUNT_ID}-${AWS_REGION}"
          artifact_key="lambda-artifacts/${DEPLOY_ENV}/${GITHUB_SHA}.zip"
          env_dir="infra/terraform/environments/${DEPLOY_ENV}"

          cat > "${env_dir}/backend.hcl" <<EOF
          bucket         = "${tfstate_bucket}"
          key            = "${DEPLOY_ENV}/terraform.tfstate"
          region         = "${AWS_REGION}"
          dynamodb_table = "${APP_NAME}-tflocks"
          encrypt        = true
          EOF

          printf '%s\n' "${TERRAFORM_TFVARS}" > "${env_dir}/terraform.tfvars"

          {
            echo "TFSTATE_BUCKET=${tfstate_bucket}"
            echo "LAMBDA_ZIP_S3_KEY=${artifact_key}"
            echo "TF_ENV_DIR=${env_dir}"
          } >> "${GITHUB_ENV}"

      - name: Upload Lambda artifact
        run: aws s3 cp build/lambda.zip "s3://${TFSTATE_BUCKET}/${LAMBDA_ZIP_S3_KEY}"

      - name: Terraform apply
        run: |
          terraform -chdir="${TF_ENV_DIR}" init -backend-config=backend.hcl
          terraform -chdir="${TF_ENV_DIR}" plan \
            -out=tfplan \
            -var "lambda_zip_s3_bucket=${TFSTATE_BUCKET}" \
            -var "lambda_zip_s3_key=${LAMBDA_ZIP_S3_KEY}" \
            -var-file=terraform.tfvars
          plan_hash="$(sha256sum "${TF_ENV_DIR}/tfplan" | cut -d " " -f 1)"
          terraform -chdir="${TF_ENV_DIR}" apply -auto-approve tfplan
          echo "TERRAFORM_PLAN_HASH=${plan_hash}" >> "${GITHUB_ENV}"

      - name: Prune old Lambda versions
        run: |
          function_name="$(terraform -chdir="${TF_ENV_DIR}" output -raw lambda_function_name)"
          bash scripts/prune_lambda_versions.sh "${function_name}"

      - name: Sync SPA
        run: |
          spa_bucket="$(terraform -chdir="${TF_ENV_DIR}" output -raw spa_bucket_name)"
          aws s3 sync apps/web/dist/ "s3://${spa_bucket}/" --delete

      - name: Invalidate CloudFront
        run: |
          distribution_id="$(terraform -chdir="${TF_ENV_DIR}" output -raw cloudfront_distribution_id)"
          aws cloudfront create-invalidation --distribution-id "${distribution_id}" --paths "/*"

      - name: Deployment summary
        run: |
          cloudfront_url="$(terraform -chdir="${TF_ENV_DIR}" output -raw cloudfront_url)"
          distribution_id="$(terraform -chdir="${TF_ENV_DIR}" output -raw cloudfront_distribution_id)"
          lambda_version="$(terraform -chdir="${TF_ENV_DIR}" output -raw lambda_function_version)"

          {
            echo "## Serverless deploy"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Environment | ${DEPLOY_ENV} |"
            echo "| Git SHA | ${GITHUB_SHA} |"
            echo "| CloudFront URL | ${cloudfront_url} |"
            echo "| CloudFront distribution | ${distribution_id} |"
            echo "| Lambda version | ${lambda_version} |"
            echo "| Lambda artifact | s3://${TFSTATE_BUCKET}/${LAMBDA_ZIP_S3_KEY} |"
            echo "| Terraform plan hash | ${TERRAFORM_PLAN_HASH} |"
          } >> "${GITHUB_STEP_SUMMARY}"
