name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "docker/**"
      - "scripts/deploy_aws.sh"
      - "Makefile"
      - "VERSION"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-2' }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID || '306980977180' }}
      APP_NAME: ${{ vars.APP_NAME || 'x12-parser-encoder' }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'x12-parser-encoder-api' }}
      APP_RUNNER_SERVICE: ${{ vars.APP_RUNNER_SERVICE || 'x12-parser-encoder-api' }}
      APP_RUNNER_ECR_ACCESS_ROLE: ${{ vars.APP_RUNNER_ECR_ACCESS_ROLE || 'x12-parser-encoder-apprunner-ecr-access' }}
      API_IMAGE_TAG: main-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to AWS
        run: bash scripts/deploy_aws.sh
