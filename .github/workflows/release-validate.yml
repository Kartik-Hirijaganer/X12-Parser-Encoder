name: Release Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Run release script tests
        run: python -m unittest discover -s scripts/tests -p "test_*.py"
      - name: Check version sync
        run: python scripts/check_version_sync.py
      - name: Validate current version changelog entry
        run: |
          version="$(cat VERSION)"
          python scripts/validate_release.py "v${version}"
