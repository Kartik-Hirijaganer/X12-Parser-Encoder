name: Terraform Drift

on:
  schedule:
    - cron: "20 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - staging
          - production
    environment: ${{ matrix.environment }}
    env:
      DEPLOY_ENV: ${{ matrix.environment }}
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-2' }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      APP_NAME: ${{ vars.APP_NAME || 'x12-parser-encoder' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate drift configuration
        env:
          TERRAFORM_TFVARS: ${{ secrets.TERRAFORM_TFVARS }}
        run: |
          if [[ -z "${AWS_ACCOUNT_ID}" ]]; then
            echo "AWS_ACCOUNT_ID repository variable is required." >&2
            exit 1
          fi
          if [[ -z "${TERRAFORM_TFVARS}" ]]; then
            echo "TERRAFORM_TFVARS ${DEPLOY_ENV} environment secret is required." >&2
            exit 1
          fi

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Configure AWS credentials with OIDC role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.APP_NAME }}-deploy-${{ env.DEPLOY_ENV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Prepare Terraform inputs
        env:
          TERRAFORM_TFVARS: ${{ secrets.TERRAFORM_TFVARS }}
        run: |
          tfstate_bucket="${APP_NAME}-tfstate-${AWS_ACCOUNT_ID}-${AWS_REGION}"
          env_dir="infra/terraform/environments/${DEPLOY_ENV}"

          cat > "${env_dir}/backend.hcl" <<EOF
          bucket         = "${tfstate_bucket}"
          key            = "${DEPLOY_ENV}/terraform.tfstate"
          region         = "${AWS_REGION}"
          dynamodb_table = "${APP_NAME}-tflocks"
          encrypt        = true
          EOF

          printf '%s\n' "${TERRAFORM_TFVARS}" > "${env_dir}/terraform.tfvars"

          {
            echo "TFSTATE_BUCKET=${tfstate_bucket}"
            echo "TF_ENV_DIR=${env_dir}"
          } >> "${GITHUB_ENV}"

      - name: Terraform drift plan
        id: plan
        run: |
          terraform -chdir="${TF_ENV_DIR}" init -backend-config=backend.hcl

          plan_args=()
          if terraform -chdir="${TF_ENV_DIR}" state list | grep -q '^module.lambda_api.aws_lambda_function.this$'; then
            current_key="$(
              terraform -chdir="${TF_ENV_DIR}" state show module.lambda_api.aws_lambda_function.this \
                | awk -F' = ' '/^[[:space:]]*s3_key[[:space:]]*=/{gsub("\"", "", $2); print $2; exit}'
            )"
            if [[ -n "${current_key}" ]]; then
              plan_args+=("-var" "lambda_zip_s3_bucket=${TFSTATE_BUCKET}")
              plan_args+=("-var" "lambda_zip_s3_key=${current_key}")
            fi
          fi

          set +e
          terraform -chdir="${TF_ENV_DIR}" plan \
            -detailed-exitcode \
            -no-color \
            -input=false \
            -var-file=terraform.tfvars \
            "${plan_args[@]}" \
            > "${RUNNER_TEMP}/terraform-drift-${DEPLOY_ENV}.txt"
          exit_code="$?"
          set -e

          if [[ "${exit_code}" == "1" ]]; then
            cat "${RUNNER_TEMP}/terraform-drift-${DEPLOY_ENV}.txt"
            exit 1
          fi

          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"

      - name: Open drift issue
        if: ${{ steps.plan.outputs.exit_code == '2' }}
        uses: actions/github-script@v7
        env:
          DEPLOY_ENV: ${{ matrix.environment }}
        with:
          script: |
            const fs = require('fs');
            const title = `Terraform drift detected (${process.env.DEPLOY_ENV})`;
            const plan = fs.readFileSync(`${process.env.RUNNER_TEMP}/terraform-drift-${process.env.DEPLOY_ENV}.txt`, 'utf8');
            const body = [
              `Terraform drift was detected for \`${process.env.DEPLOY_ENV}\`.`,
              '',
              '```text',
              plan.slice(0, 60000),
              plan.length > 60000 ? '\n... plan truncated for GitHub issue length ...' : '',
              '```',
            ].join('\n');

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const issue = existing.find((item) => item.title === title && !item.pull_request);

            if (issue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
