name: Docs Autocommit

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/app/routers/**"
      - "apps/api/app/schemas/**"
      - "packages/x12-edi-tools/src/**"
      - "infra/terraform/**"
      - "VERSION"

permissions:
  contents: write

jobs:
  docs-autocommit:
    if: ${{ vars.DOCS_AUTOCOMMIT_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DOCS_BOT_APP_ID }}
          private-key: ${{ secrets.DOCS_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install documentation dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -e "packages/x12-edi-tools[dev]" -e "apps/api[dev]"

      - name: Regenerate docs
        run: make docs-regenerate

      - name: Commit generated docs
        run: |
          if git diff --quiet -- docs/ README.md; then
            echo "Generated docs are already current."
            exit 0
          fi

          git config user.name "x12-docs-bot"
          git config user.email "x12-docs-bot@users.noreply.github.com"
          git add docs/ README.md
          git commit -m "chore(docs): autoregen [skip ci]"
          git push
