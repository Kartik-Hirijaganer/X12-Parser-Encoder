name: Docs Drift

on:
  pull_request:
    paths:
      - "apps/api/app/routers/**"
      - "apps/api/app/schemas/**"
      - "packages/x12-edi-tools/src/**"
      - "infra/terraform/**"
      - "VERSION"

permissions:
  contents: read
  pull-requests: write

jobs:
  docs-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install documentation dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -e "packages/x12-edi-tools[dev]" -e "apps/api[dev]"

      - name: Regenerate docs and detect drift
        id: drift
        continue-on-error: true
        run: |
          make docs-regenerate
          git diff -- docs/ README.md > "${RUNNER_TEMP}/docs-drift.diff"
          if [[ -s "${RUNNER_TEMP}/docs-drift.diff" ]]; then
            cat "${RUNNER_TEMP}/docs-drift.diff"
            exit 1
          fi

      - name: Comment with docs drift
        if: ${{ steps.drift.outcome == 'failure' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diffPath = `${process.env.RUNNER_TEMP}/docs-drift.diff`;
            const diff = fs.existsSync(diffPath) ? fs.readFileSync(diffPath, 'utf8') : '';
            const body = [
              'Docs drift detected.',
              '',
              'Run `make docs-regenerate` and commit the result.',
              '',
              diff ? '```diff' : '',
              diff ? diff.slice(0, 60000) : '',
              diff && diff.length > 60000 ? '\n... diff truncated for GitHub comment length ...' : '',
              diff ? '```' : '',
            ].filter(Boolean).join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail on docs drift
        if: ${{ steps.drift.outcome == 'failure' }}
        run: exit 1
