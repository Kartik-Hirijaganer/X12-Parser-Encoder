[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "x12-edi-tools"
version = "0.1.1"
description = "Python-native X12 270/271 parsing, encoding, and validation tools."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "X12-Parser-Encoder contributors" }]
dependencies = [
  "pydantic>=2.0,<3.0",
]

[project.optional-dependencies]
excel = [
  "openpyxl>=3.1,<4.0",
]
pandas = [
  "pandas>=2.2,<3.0",
]
all = [
  "openpyxl>=3.1,<4.0",
  "pandas>=2.2,<3.0",
]
dev = [
  "build>=1.2,<2.0",
  "detect-secrets>=1.5.0,<2.0",
  "eralchemy>=1.5,<2.0",
  "graphviz>=0.20,<1.0",
  "hypothesis>=6.120,<7.0",
  "mypy>=1.11,<2.0",
  "openapi-spec-validator>=0.7,<0.8",
  "openpyxl>=3.1,<4.0",
  "pre-commit>=3.8,<5.0",
  "pytest>=8.3,<9.0",
  "pytest-cov>=5.0,<6.0",
  "ruff>=0.8.0,<1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/x12_edi_tools"]

[tool.hatch.build.targets.sdist]
include = [
  "src/x12_edi_tools",
  "tests",
  "README.md",
]

[tool.pytest.ini_options]
addopts = "-ra"
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
src = ["src", "tests"]
target-version = "py311"

[tool.ruff.lint]
select = ["B", "E", "F", "I", "UP"]

[tool.mypy]
python_version = "3.11"
strict = true
mypy_path = "src"
packages = ["x12_edi_tools"]
warn_unused_configs = true

[tool.coverage.run]
omit = [
  "*/x12_edi_tools/builders/*",
  "*/x12_edi_tools/readers/*",
  "*/x12_edi_tools/encoder/claim_encoder.py",
  "*/x12_edi_tools/models/loops/claims/*",
  "*/x12_edi_tools/models/loops/remittance/*",
  "*/x12_edi_tools/models/segments/amt.py",
  "*/x12_edi_tools/models/segments/bpr.py",
  "*/x12_edi_tools/models/segments/cas.py",
  "*/x12_edi_tools/models/segments/clm.py",
  "*/x12_edi_tools/models/segments/clp.py",
  "*/x12_edi_tools/models/segments/cn1.py",
  "*/x12_edi_tools/models/segments/cr1.py",
  "*/x12_edi_tools/models/segments/cr2.py",
  "*/x12_edi_tools/models/segments/cr3.py",
  "*/x12_edi_tools/models/segments/crc.py",
  "*/x12_edi_tools/models/segments/hcp.py",
  "*/x12_edi_tools/models/segments/hi.py",
  "*/x12_edi_tools/models/segments/k3.py",
  "*/x12_edi_tools/models/segments/lx.py",
  "*/x12_edi_tools/models/segments/mea.py",
  "*/x12_edi_tools/models/segments/mia.py",
  "*/x12_edi_tools/models/segments/moa.py",
  "*/x12_edi_tools/models/segments/nte.py",
  "*/x12_edi_tools/models/segments/oi.py",
  "*/x12_edi_tools/models/segments/pat.py",
  "*/x12_edi_tools/models/segments/plb.py",
  "*/x12_edi_tools/models/segments/pwk.py",
  "*/x12_edi_tools/models/segments/qty.py",
  "*/x12_edi_tools/models/segments/sbr.py",
  "*/x12_edi_tools/models/segments/sv1.py",
  "*/x12_edi_tools/models/segments/sv2.py",
  "*/x12_edi_tools/models/segments/sv3.py",
  "*/x12_edi_tools/models/segments/svc.py",
  "*/x12_edi_tools/models/segments/svd.py",
  "*/x12_edi_tools/models/transactions/transaction_835.py",
  "*/x12_edi_tools/models/transactions/transaction_837i.py",
  "*/x12_edi_tools/models/transactions/transaction_837p.py",
  "*/x12_edi_tools/parser/transaction_dispatch.py",
  "*/x12_edi_tools/payers/dc_medicaid/constants_835.py",
  "*/x12_edi_tools/payers/dc_medicaid/constants_837.py",
  "*/x12_edi_tools/payers/dc_medicaid/profile_835.py",
  "*/x12_edi_tools/payers/dc_medicaid/profile_837i.py",
  "*/x12_edi_tools/payers/dc_medicaid/profile_837p.py",
  "*/x12_edi_tools/validator/rules/*",
]

[tool.coverage.report]
exclude_lines = [
  "pragma: no cover",
  "raise NotImplementedError",
]
