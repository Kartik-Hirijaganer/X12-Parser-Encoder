[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "x12-edi-tools"
version = "0.1.0"
description = "Python-native X12 270/271 parsing, encoding, and validation tools."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "X12-Parser-Encoder contributors" }]
dependencies = [
  "pydantic>=2.0,<3.0",
]

[project.optional-dependencies]
excel = [
  "openpyxl>=3.1,<4.0",
]
pandas = [
  "pandas>=2.2,<3.0",
]
all = [
  "openpyxl>=3.1,<4.0",
  "pandas>=2.2,<3.0",
]
dev = [
  "build>=1.2,<2.0",
  "detect-secrets>=1.5.0,<2.0",
  "hypothesis>=6.120,<7.0",
  "mypy>=1.11,<2.0",
  "openpyxl>=3.1,<4.0",
  "pre-commit>=3.8,<5.0",
  "pytest>=8.3,<9.0",
  "pytest-cov>=5.0,<6.0",
  "ruff>=0.8.0,<1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/x12_edi_tools"]

[tool.hatch.build.targets.sdist]
include = [
  "src/x12_edi_tools",
  "tests",
  "README.md",
]

[tool.pytest.ini_options]
addopts = "-ra"
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
src = ["src", "tests"]
target-version = "py311"

[tool.ruff.lint]
select = ["B", "E", "F", "I", "UP"]

[tool.mypy]
python_version = "3.11"
strict = true
mypy_path = "src"
packages = ["x12_edi_tools"]
warn_unused_configs = true
